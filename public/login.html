<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/assets/images/dad-logo.png" type="image/png">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In — DAD Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: #F0F4FB; }

    .login-wrap { min-height: 100vh; display: flex; }

    /* ── LEFT PANEL ── */
    .login-left {
      flex: 1; display: none;
      align-items: center; justify-content: center;
      background: linear-gradient(145deg, #130D3A 0%, #1E1160 30%, #331080 60%, #561888 85%, #6B1A96 100%);
      position: relative; overflow: hidden;
    }
    @media(min-width: 900px) { .login-left { display: flex; } }
    .login-left::before {
      content: ''; position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(255,255,255,.03);
      top: -160px; right: -160px; pointer-events: none;
    }
    .login-left::after {
      content: ''; position: absolute;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(255,255,255,.04);
      bottom: -100px; left: -80px; pointer-events: none;
    }
    .login-left-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }

    /* ── RIGHT PANEL ── */
    .login-right {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 36px; background: #fff;
    }
    .login-card { width: 100%; max-width: 370px; }

    .login-err {
      display: none; background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2); border-radius: 10px;
      padding: 10px 14px; font-size: 13px; color: #EF4444;
      margin-bottom: 14px; font-weight: 600;
    }
    .btn-login {
      width: 100%; padding: 13px; margin-top: 8px;
      background: linear-gradient(135deg, #1E1160, #561888);
      color: #fff; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; letter-spacing: .02em;
      box-shadow: 0 4px 18px rgba(50,16,128,.30);
    }
    .btn-login:hover:not(:disabled) {
      background: linear-gradient(135deg, #271580, #6A1FA8);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(50,16,128,.38);
    }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .login-member-hint {
      text-align: center; margin-top: 24px;
      padding: 12px 14px; border-radius: 11px;
      background: #F7F9FD; border: 1.5px solid #E4EAF5;
      font-size: 12px; color: #9CA3AF; line-height: 1.6;
    }
    .login-member-hint strong { color: #331080; }
  </style>
</head>
<body>
<div class="login-wrap">

  <!-- ══ LEFT — Logo panel ══ -->
  <div class="login-left">
    <div class="login-left-inner">
      <!-- Full logo image -->
      <img src="/assets/images/dad-logo.png"
           alt="Doctors At Door"
           style="width: min(340px, 70%); height: auto; border-radius: 32px; display: block; margin-bottom: 32px;">

      <div style="font-family:'DM Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.45);line-height:1.7;max-width:300px">
        Team · Finance · Marketing · Tasks · Social Media<br>All in one place, always live.
      </div>
    </div>
  </div>

  <!-- ══ RIGHT — Sign-in form ══ -->
  <div class="login-right">
    <div class="login-card">

      <!-- Logo icon + name in form header -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
        <div style="width:56px;height:56px;border-radius:16px;flex-shrink:0;overflow:hidden;box-shadow:0 6px 20px rgba(50,16,128,.32)">
          <img src="/assets/images/dad-logo.png"
               alt="DAD"
               style="width:100%;height:100%;object-fit:cover;display:block">
        </div>
        <div>
          <div style="font-family:'Montserrat','DM Sans',sans-serif;font-size:18px;font-weight:900;color:#111827;letter-spacing:-.3px;line-height:1.1">
            Doctors At Door
          </div>
          <div style="font-family:'DM Sans',sans-serif;font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.1em;margin-top:3px">
            Operations Dashboard
          </div>
        </div>
      </div>

      <!-- Heading -->
      <div style="font-family:'Montserrat','DM Sans',sans-serif;font-size:24px;font-weight:700;color:#111827;margin-bottom:4px;letter-spacing:-.3px">
        Welcome back
      </div>
      <div style="font-size:13.5px;color:#9CA3AF;margin-bottom:26px">
        Sign in to access your command centre
      </div>

      <div class="login-err" id="loginErr">Incorrect password. Please try again.</div>

      <form id="loginForm" autocomplete="on">
        <div class="form-grp">
          <label class="form-lbl" for="pw">Admin Password</label>
          <input type="password" id="pw" class="form-inp"
                 placeholder="Enter your password"
                 required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

      <div class="login-member-hint">
        Team member? Access your personal portal at<br>
        <strong>team.doctoratdoor.com/<em>yourname</em></strong>
      </div>

    </div>
  </div>

</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value }),
    });
    const d = await r.json();
    if (d.success) {
      window.location.href = '/';
    } else {
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
