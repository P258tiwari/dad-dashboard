<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/assets/images/dad-logo.png" type="image/png">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Competitor Analysis — DAD Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <script src="/assets/nav.js"></script>
  <style>

    /* ── Filter chips (same as tasks) ── */
    .chips-scroll-outer { position:relative; overflow:hidden; min-width:0; }
    .chips-scroll-outer::after { content:''; position:absolute; top:0; right:0; bottom:0; width:40px; background:linear-gradient(to right, transparent, var(--bg)); pointer-events:none; z-index:1; }
    .cmp-chips { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    @media (max-width:700px) {
      .chips-bar { flex-direction:column; align-items:stretch; gap:10px; }
      .chips-scroll-outer { width:100%; }
      .cmp-chips { flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:4px; padding-right:36px; }
      .cmp-chips::-webkit-scrollbar { display:none; }
      .cmp-search-wrap { width:100%; min-width:unset; }
    }
    .cmp-chip {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 18px; border-radius:50px;
      border:1.5px solid var(--border); background:var(--white);
      font-size:13px; font-weight:600; color:var(--txt2);
      cursor:pointer; transition:all .16s ease;
      box-shadow:var(--shadow-xs); white-space:nowrap; font-family:var(--font);
    }
    .cmp-chip:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-lt); }
    .cmp-chip.active { background:var(--sb-active); color:white; border-color:var(--sb-active); box-shadow:0 3px 12px rgba(27,28,49,.26); }
    .chip-cnt { font-size:11px; font-weight:700; padding:1px 7px; border-radius:50px; }
    .cmp-chip.active .chip-cnt { background:rgba(255,255,255,.22); color:white; }
    .cmp-chip:not(.active) .chip-cnt { background:var(--surface); color:var(--muted); border:1px solid var(--border); }

    /* ── Search (same as tasks) ── */
    .cmp-search-wrap {
      display:flex; align-items:center; gap:8px;
      background:var(--white); border:1.5px solid var(--border);
      border-radius:50px; padding:9px 16px; min-width:200px;
      box-shadow:var(--shadow-xs); transition:all .2s;
    }
    .cmp-search-wrap:focus-within { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-lt); }
    .cmp-search-wrap svg { color:var(--muted); flex-shrink:0; }
    .cmp-search-wrap input { border:none; outline:none; background:transparent; font-family:var(--font); font-size:13px; color:var(--txt); width:100%; }
    .cmp-search-wrap input::placeholder { color:var(--muted); }

    /* ── Competitor card grid ── */
    #cmpCards { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; min-height:180px; }

    /* ── Competitor card ── */
    .cmp-card {
      background:var(--white); border:1.5px solid var(--border);
      border-radius:16px; overflow:hidden;
      box-shadow:var(--shadow-xs);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      animation:cardSlide .26s ease both;
      cursor:pointer;
    }
    @keyframes cardSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .cmp-card:hover { transform:translateY(-3px); }
    .cmp-card.threat-high:hover   { box-shadow:0 8px 28px rgba(239,68,68,.15);  border-color:rgba(239,68,68,.3); }
    .cmp-card.threat-medium:hover { box-shadow:0 8px 28px rgba(245,158,11,.14); border-color:rgba(245,158,11,.3); }
    .cmp-card.threat-low:hover    { box-shadow:0 8px 28px rgba(16,185,129,.12); border-color:rgba(16,185,129,.28); }

    /* Accent bar */
    .cmp-accent { height:3.5px; width:100%; }
    .accent-high   { background:linear-gradient(90deg,#EF4444,#F87171); }
    .accent-medium { background:linear-gradient(90deg,#F59E0B,#FCD34D); }
    .accent-low    { background:linear-gradient(90deg,#10B981,#34D399); }

    /* Card body */
    .cmp-card-body { padding:16px 18px 15px; }
    .cmp-card-head { display:flex; align-items:flex-start; gap:13px; margin-bottom:13px; }
    .cmp-av {
      width:42px; height:42px; border-radius:11px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:800; color:#fff; flex-shrink:0;
      font-family:'Balthazar',Georgia,serif;
    }
    .cmp-name-wrap { flex:1; min-width:0; }
    .cmp-app-name { font-size:13.5px; font-weight:700; color:var(--txt); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cmp-company  { font-size:11.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cmp-card-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:13px; }
    .cmp-tag {
      display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
      border-radius:50px; font-size:10.5px; font-weight:600;
      background:var(--surface); color:var(--txt2); border:1px solid var(--border);
    }
    .cmp-card-foot {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:11px; border-top:1px solid var(--border-lt); gap:8px; flex-wrap:wrap;
    }
    .cmp-foot-left  { display:flex; align-items:center; gap:7px; }
    .cmp-web-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 12px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--white);
      font-size:11px; font-weight:700; color:var(--txt2);
      text-decoration:none; transition:all .14s; font-family:var(--font);
    }
    .cmp-web-btn:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-lt); }

    /* ── Empty state ── */
    .cmp-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:64px 24px; color:var(--muted); gap:12px; text-align:center;
      grid-column:1/-1;
    }
    .cmp-empty-icon { width:56px; height:56px; border-radius:16px; background:var(--surface); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; }

    /* ── Drawer ── */
    .cmp-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:300; display:none; backdrop-filter:blur(2px); }
    .cmp-overlay.open { display:block; }
    .cmp-drawer {
      position:fixed; top:0; right:-480px; width:440px; height:100vh;
      background:var(--white); border-left:1.5px solid var(--border);
      box-shadow:-8px 0 32px rgba(0,0,0,.10);
      z-index:301; display:flex; flex-direction:column;
      transition:right .24s cubic-bezier(.4,0,.2,1);
    }
    .cmp-drawer.open { right:0; }
    .cmp-drawer-head {
      padding:20px 22px 16px;
      border-bottom:1.5px solid var(--border-lt);
      position:relative; flex-shrink:0;
    }
    .cmp-drawer-accent { height:3px; width:100%; position:absolute; top:0; left:0; right:0; }
    .cmp-drawer-close {
      position:absolute; top:16px; right:18px;
      width:28px; height:28px; border-radius:7px;
      border:1.5px solid var(--border); background:var(--white);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--muted); transition:all .14s;
    }
    .cmp-drawer-close:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-t); }
    .cmp-drawer-title { font-family:'Balthazar',Georgia,serif; font-size:20px; color:var(--txt); margin-bottom:4px; padding-right:36px; margin-top:6px; }
    .cmp-drawer-sub   { font-size:11.5px; color:var(--muted); }
    .cmp-drawer-body  { flex:1; overflow-y:auto; padding:20px 22px 32px; }
    .cmp-drawer-body::-webkit-scrollbar { width:4px; }
    .cmp-drawer-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:50px; }
    .cmp-drawer-sec   { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:9px; margin-top:20px; }
    .cmp-drawer-sec:first-child { margin-top:0; }
    .cmp-drawer-text  { font-size:12.5px; color:var(--txt2); line-height:1.75; }
    .cmp-drawer-tags  { display:flex; flex-wrap:wrap; gap:6px; }
    .cmp-drawer-tag   { display:inline-flex; align-items:center; padding:4px 10px; border-radius:50px; font-size:11px; font-weight:600; background:var(--surface); color:var(--txt2); border:1.5px solid var(--border); }
    .cmp-drawer-field { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--surface); border-radius:10px; margin-bottom:8px; border:1px solid var(--border-lt); }
    .cmp-drawer-field-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:3px; }
    .cmp-drawer-field-val { font-size:12.5px; font-weight:600; color:var(--txt); }

    /* ── Right panel ── */
    .rp-kpi-row { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:12px; background:var(--surface); border:1.5px solid var(--border-lt); margin-bottom:7px; transition:transform .14s; }
    .rp-kpi-row:hover { transform:translateX(2px); }
    .rp-kpi-icon { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .rp-kpi-body { flex:1; min-width:0; }
    .rp-kpi-val  { font-size:19px; font-weight:800; color:var(--txt); line-height:1; }
    .rp-kpi-lbl  { font-size:10.5px; color:var(--muted); margin-top:2px; }

    /* Pulse bars */
    .pulse-row { margin-bottom:11px; }
    .pulse-label { display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:4px; }
    .pulse-name  { font-weight:600; color:var(--txt); }
    .pulse-count { font-weight:700; color:var(--muted); font-size:11px; }
    .pulse-bg    { height:6px; background:var(--border-lt); border-radius:50px; overflow:hidden; }
    .pulse-fill  { height:100%; border-radius:50px; transition:width 1s cubic-bezier(.4,0,.2,1); }

    /* Watchlist items */
    .watch-item {
      display:flex; align-items:flex-start; gap:10px;
      padding:10px 0; border-bottom:1px solid var(--border-lt);
      cursor:pointer; transition:background .12s;
    }
    .watch-item:last-child { border-bottom:none; }
    .watch-item:hover .watch-name { color:var(--brand); }
    .watch-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .watch-name { font-size:12px; font-weight:700; color:var(--txt); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:color .12s; }
    .watch-co   { font-size:10.5px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    @media (max-width:700px) { #cmpCards { grid-template-columns:1fr; } .cmp-banner { grid-template-columns:1fr 1fr; gap:10px; } .cmp-drawer { width:100%; right:-100%; } }
  </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar"></aside>

<!-- Detail drawer -->
<div class="cmp-overlay" id="cmpOverlay" onclick="closeDrawer()"></div>
<div class="cmp-drawer" id="cmpDrawer">
  <div class="cmp-drawer-head">
    <div class="cmp-drawer-accent" id="drawerAccent"></div>
    <button class="cmp-drawer-close" onclick="closeDrawer()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
      <div class="cmp-av" id="drawerAv" style="width:34px;height:34px;font-size:12px"></div>
      <div>
        <div class="cmp-drawer-title" id="drawerTitle">—</div>
      </div>
    </div>
    <div class="cmp-drawer-sub" id="drawerSub"></div>
    <div style="display:flex;align-items:center;gap:7px;margin-top:10px" id="drawerBadges"></div>
  </div>
  <div class="cmp-drawer-body">
    <div class="cmp-drawer-sec">Quick Info</div>
    <div id="drawerFields"></div>
    <div class="cmp-drawer-sec">Key Features</div>
    <div class="cmp-drawer-tags" id="drawerFeatures"></div>
    <div class="cmp-drawer-sec">Target Users</div>
    <div class="cmp-drawer-tags" id="drawerTargetUsers"></div>
    <div class="cmp-drawer-sec">Notes</div>
    <div class="cmp-drawer-text" id="drawerNotes"></div>
    <div class="cmp-drawer-sec">Funding Status</div>
    <div class="cmp-drawer-text" id="drawerFunding"></div>
  </div>
</div>

<div class="page-body">

  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar" style="margin-bottom:22px">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <div>
          <div class="page-title" style="display:flex;align-items:center;gap:9px">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Competitor Analysis
          </div>
          <div class="page-sub" id="topbarDate"></div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="https://www.notion.so" target="_blank" rel="noopener noreferrer" class="notion-badge">
          <img src="/assets/images/notion-logo.svg" alt="Notion" width="18" height="18" style="display:block">
          <span>Notion</span><span class="notion-dot"></span>
        </a>
      </div>
    </div>

    <!-- CHIPS + SEARCH -->
    <div class="chips-bar" style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap">
      <!-- Left: threat chips only -->
      <div class="chips-scroll-outer">
        <div class="cmp-chips" id="threatChips"></div>
      </div>
      <!-- Right: region dropdown + search -->
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <select id="regionSelect" onchange="_activeRegion=this.value;renderCards()"
          style="display:inline-flex;align-items:center;padding:8px 32px 8px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--white) url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%238A94A6%22 stroke-width=%222.5%22><polyline points=%226 9 12 15 18 9%22/></svg>') no-repeat right 12px center;background-size:12px;appearance:none;-webkit-appearance:none;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;font-family:var(--font);box-shadow:var(--shadow-xs);transition:all .15s;white-space:nowrap">
          <option value="All">All Regions</option>
        </select>
        <div class="cmp-search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="cmpSearch" type="text" placeholder="Search competitors…" autocomplete="off">
        </div>
      </div>
    </div>

    <!-- CARDS -->
    <div id="cmpCards">
      <div style="grid-column:1/-1" class="loading"><div class="spin"></div>Loading competitors…</div>
    </div>

  </main>

  <!-- RIGHT PANEL -->
  <aside class="live-feed-panel" id="liveFeedPanel">
    <div class="rp-card">
      <div class="rp-header">
        <div class="rp-title">Threat Intelligence</div>
        <div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#10B981">
          <span style="width:6px;height:6px;border-radius:50%;background:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,.2);display:inline-block"></span>Live
        </div>
      </div>
      <div class="rp-content" id="rpContent">
        <div class="loading"><div class="spin"></div></div>
      </div>
    </div>
  </aside>

</div>

<script src="/assets/dashboard.js"></script>
<script>
document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

/* ── State ── */
let _all           = [];
let _activeRegion  = 'All';
let _activeThreat  = 'All';
let _searchQ       = '';

/* ── Threat helpers ── */
function tLevel(t) {
  const s = (t||'').toLowerCase();
  if (s.includes('high'))   return 'high';
  if (s.includes('medium')) return 'medium';
  return 'low';
}
function tColor(lvl) {
  return lvl==='high' ? '#EF4444' : lvl==='medium' ? '#F59E0B' : '#10B981';
}
function tBg(lvl) {
  return lvl==='high' ? 'rgba(239,68,68,.12)' : lvl==='medium' ? 'rgba(245,158,11,.12)' : 'rgba(16,185,129,.12)';
}
function tDot(c) { return `<svg width="8" height="8" viewBox="0 0 8 8" style="display:inline-block;vertical-align:middle;flex-shrink:0"><circle cx="4" cy="4" r="4" fill="${c}"/></svg>`; }
function tLabel(lvl) {
  if (lvl==='high')   return `${tDot('#EF4444')} High`;
  if (lvl==='medium') return `${tDot('#F59E0B')} Medium`;
  return `${tDot('#10B981')} Low`;
}

/* ── ABDM helper ── */
function isAbdmYes(v) {
  if (v === true)  return true;
  if (v === false) return false;
  const s = String(v||'').toLowerCase();
  return s==='yes' || s==='true';
}
function isAbdmNo(v) {
  if (v === false) return true;
  const s = String(v||'').toLowerCase();
  return s==='no' || s==='false';
}
function abdmPill(v) {
  if (isAbdmYes(v)) return `<span class="badge b-green">Yes</span>`;
  if (isAbdmNo(v))  return `<span class="badge b-red">No</span>`;
  return `<span class="badge b-gray">—</span>`;
}

/* ── Array / string normaliser ── */
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.map(String).filter(Boolean);
  return String(v).split(/[,;]+/).map(s=>s.trim()).filter(Boolean);
}
function str(v) {
  if (!v) return '—';
  if (Array.isArray(v)) return v.join(', ');
  return String(v);
}

/* ── All unique regions ── */
function allRegions() {
  const set = new Set();
  _all.forEach(c => {
    toArr(c.region).forEach(r => set.add(r));
  });
  return ['All', ...Array.from(set).sort()];
}

/* ── Filter predicate ── */
function matches(c) {
  if (_activeThreat !== 'All' && tLevel(c.threatLevel) !== _activeThreat) return false;
  if (_activeRegion !== 'All') {
    const r = str(c.region).toLowerCase();
    if (!r.includes(_activeRegion.toLowerCase())) return false;
  }
  if (_searchQ) {
    const q = _searchQ.toLowerCase();
    const hay = [(c.name||''), (c.company||''), str(c.region)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

/* ── Filter chips ── */
function buildChips() {
  const regions = allRegions();
  const DOT = (c) => `<svg width="9" height="9" viewBox="0 0 9 9" style="display:inline-block;vertical-align:middle;flex-shrink:0"><circle cx="4.5" cy="4.5" r="4.5" fill="${c}"/></svg>`;
  const threats = [
    { key:'All',    label:'All' },
    { key:'high',   label:`${DOT('#EF4444')} High` },
    { key:'medium', label:`${DOT('#F59E0B')} Medium` },
    { key:'low',    label:`${DOT('#10B981')} Low` },
  ];

  /* Region dropdown */
  const sel = document.getElementById('regionSelect');
  const prev = sel.value;
  sel.innerHTML = regions.map(r => {
    const cnt = r==='All' ? _all.length : _all.filter(c=>str(c.region).toLowerCase().includes(r.toLowerCase())).length;
    const label = r==='All' ? `All Regions (${cnt})` : `${r} (${cnt})`;
    return `<option value="${r}" ${r===_activeRegion?'selected':''}>${label}</option>`;
  }).join('');

  /* Threat chips — count from region+search filtered set */
  const regionFiltered = _all.filter(c => {
    if (_activeRegion !== 'All') {
      const r = str(c.region).toLowerCase();
      if (!r.includes(_activeRegion.toLowerCase())) return false;
    }
    if (_searchQ) {
      const q = _searchQ.toLowerCase();
      if (![(c.name||''), (c.company||''), str(c.region)].join(' ').toLowerCase().includes(q)) return false;
    }
    return true;
  });
  document.getElementById('threatChips').innerHTML = threats.map(t => {
    const cnt = t.key==='All' ? regionFiltered.length : regionFiltered.filter(c=>tLevel(c.threatLevel)===t.key).length;
    return `<button class="cmp-chip${_activeThreat===t.key?' active':''}" data-threat="${t.key}" style="display:inline-flex;align-items:center;gap:6px">${t.label}<span class="chip-cnt">${cnt}</span></button>`;
  }).join('');

  document.querySelectorAll('.cmp-chip[data-threat]').forEach(btn => {
    btn.onclick = () => { _activeThreat = btn.dataset.threat; buildChips(); renderCards(); };
  });
}

/* ── Render cards ── */
function renderCards() {
  buildChips();
  const box  = document.getElementById('cmpCards');
  const list = _all.filter(matches);

  if (!list.length) {
    box.innerHTML = `<div class="cmp-empty">
      <div class="cmp-empty-icon">${ico('search',24)}</div>
      <div style="font-size:14px;font-weight:700;color:var(--txt2)">No competitors found</div>
      <div style="font-size:12px;color:var(--muted)">Try adjusting your filters</div>
    </div>`;
    return;
  }

  box.innerHTML = list.map((c, i) => {
    const lvl     = tLevel(c.threatLevel);
    const col     = tColor(lvl);
    const bg      = tBg(lvl);
    const av      = initials(c.name||'?');
    const regions = toArr(c.region);
    const revArr  = toArr(c.revenueModel);
    const intArr  = toArr(c.integrationType);

    return `
      <div class="cmp-card threat-${lvl}" style="animation-delay:${i*30}ms" data-id="${c.id}" onclick="openDrawer('${c.id}')">
        <div class="cmp-accent accent-${lvl}"></div>
        <div class="cmp-card-body">
          <div class="cmp-card-head">
            <div class="cmp-av" style="background:${col}">${av}</div>
            <div class="cmp-name-wrap">
              <div class="cmp-app-name" title="${(c.name||'').replace(/"/g,'&quot;')}">${c.name||'—'}</div>
              <div class="cmp-company">${c.company||'—'}</div>
            </div>
            <div>${abdmPill(c.abdm)}</div>
          </div>

          <div class="cmp-card-tags">
            ${regions.slice(0,2).map(r=>`<span class="cmp-tag">${ico('map-pin',10)} ${r}</span>`).join('')}
            ${revArr[0] ? `<span class="cmp-tag">${ico('dollar-sign',10)} ${revArr[0]}</span>` : ''}
            ${intArr[0] ? `<span class="cmp-tag">${ico('layers',10)} ${intArr[0]}</span>` : ''}
          </div>

          <div class="cmp-card-foot">
            <div class="cmp-foot-left">
              <span class="badge" style="background:${bg};color:${col};border:none;font-size:10.5px">${tLabel(lvl)}</span>
              ${c.fundingStatus ? `<span style="font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px" title="${c.fundingStatus}">${ico('activity',10)} ${c.fundingStatus}</span>` : ''}
            </div>
            ${c.website
              ? `<a class="cmp-web-btn" href="${c.website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${ico('external-link',11)} Visit</a>`
              : `<span style="font-size:11px;color:var(--muted);font-style:italic">No website</span>`}
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ── Detail drawer ── */
function openDrawer(id) {
  const c = _all.find(x=>x.id===id);
  if (!c) return;

  const lvl  = tLevel(c.threatLevel);
  const col  = tColor(lvl);
  const bg   = tBg(lvl);

  document.getElementById('drawerAccent').className = `cmp-drawer-accent accent-${lvl}`;
  document.getElementById('drawerAv').textContent   = initials(c.name||'?');
  document.getElementById('drawerAv').style.background = col;
  document.getElementById('drawerTitle').textContent = c.name||'—';
  document.getElementById('drawerSub').textContent   = [c.company, str(c.region)!=='—'?str(c.region):null].filter(Boolean).join(' · ');
  document.getElementById('drawerBadges').innerHTML  =
    `<span class="badge" style="background:${bg};color:${col};border:none">${tLabel(lvl)}</span>
     ${abdmPill(c.abdm)}
     <span class="badge b-gray" style="font-size:10px">ABDM ${isAbdmYes(c.abdm)?'✓':'✗'}</span>`;

  /* Quick info fields */
  const fields = [
    { icon:'dollar-sign', lbl:'Revenue Model',    val:str(c.revenueModel) },
    { icon:'layers',      lbl:'Integration Type', val:str(c.integrationType) },
    { icon:'map-pin',     lbl:'Region',           val:str(c.region) },
  ].filter(f=>f.val&&f.val!=='—');
  document.getElementById('drawerFields').innerHTML = fields.map(f=>`
    <div class="cmp-drawer-field">
      <div style="color:var(--brand);flex-shrink:0;margin-top:2px">${ico(f.icon,14)}</div>
      <div>
        <div class="cmp-drawer-field-lbl">${f.lbl}</div>
        <div class="cmp-drawer-field-val">${f.val}</div>
      </div>
    </div>`).join('');

  /* Tags */
  const features = toArr(c.keyFeatures);
  const targets  = toArr(c.targetUsers);
  document.getElementById('drawerFeatures').innerHTML = features.length
    ? features.map(f=>`<span class="cmp-drawer-tag">${f}</span>`).join('')
    : '<span style="font-size:12px;color:var(--muted);font-style:italic">No data</span>';
  document.getElementById('drawerTargetUsers').innerHTML = targets.length
    ? targets.map(t=>`<span class="cmp-drawer-tag">${t}</span>`).join('')
    : '<span style="font-size:12px;color:var(--muted);font-style:italic">No data</span>';

  /* Text fields */
  const notes   = str(c.notes);
  const funding = str(c.fundingStatus);
  document.getElementById('drawerNotes').textContent   = notes!=='—'   ? notes   : 'No notes available';
  document.getElementById('drawerFunding').textContent = funding!=='—' ? funding : 'Unknown';

  document.getElementById('cmpDrawer').classList.add('open');
  document.getElementById('cmpOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('cmpDrawer').classList.remove('open');
  document.getElementById('cmpOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

/* ── Right panel ── */
function buildRightPanel() {
  const high   = _all.filter(c=>tLevel(c.threatLevel)==='high');
  const medium = _all.filter(c=>tLevel(c.threatLevel)==='medium');
  const low    = _all.filter(c=>tLevel(c.threatLevel)==='low');
  const abdmY  = _all.filter(c=>isAbdmYes(c.abdm)).length;
  const abdmN  = _all.filter(c=>isAbdmNo(c.abdm)).length;

  /* Regional breakdown */
  const regMap = {};
  _all.forEach(c => {
    toArr(c.region).forEach(r => { regMap[r]=(regMap[r]||0)+1; });
  });
  const regMax = Math.max(...Object.values(regMap),1);
  const regBars = Object.entries(regMap).sort(([,a],[,b])=>b-a).slice(0,6).map(([r,n])=>`
    <div class="pulse-row">
      <div class="pulse-label">
        <span class="pulse-name">${r}</span>
        <span class="pulse-count">${n}</span>
      </div>
      <div class="pulse-bg">
        <div class="pulse-fill" style="width:0%;background:var(--brand)" data-pct="${Math.round(n/regMax*100)}"></div>
      </div>
    </div>`).join('');

  /* Watchlist */
  const watchlist = [...high, ...medium].slice(0,5);

  document.getElementById('rpContent').innerHTML = `
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;margin-top:4px">At a Glance</div>
    <div class="rp-kpi-row">
      <div class="rp-kpi-icon" style="background:rgba(9,0,113,.1);color:var(--brand)">${ico('search',15)}</div>
      <div class="rp-kpi-body"><div class="rp-kpi-val">${_all.length}</div><div class="rp-kpi-lbl">Total Tracked</div></div>
    </div>
    <div class="rp-kpi-row">
      <div class="rp-kpi-icon" style="background:rgba(239,68,68,.1);color:#EF4444">${ico('alert-triangle',15)}</div>
      <div class="rp-kpi-body"><div class="rp-kpi-val" style="color:${high.length?'#EF4444':'var(--txt)'}">${high.length}</div><div class="rp-kpi-lbl">High Threat</div></div>
    </div>
    <div class="rp-kpi-row">
      <div class="rp-kpi-icon" style="background:rgba(245,158,11,.1);color:#F59E0B">${ico('zap',15)}</div>
      <div class="rp-kpi-body"><div class="rp-kpi-val">${medium.length}</div><div class="rp-kpi-lbl">Medium Threat</div></div>
    </div>
    <div class="rp-kpi-row">
      <div class="rp-kpi-icon" style="background:rgba(16,185,129,.1);color:#10B981">${ico('check-circle',15)}</div>
      <div class="rp-kpi-body"><div class="rp-kpi-val">${low.length}</div><div class="rp-kpi-lbl">Low Threat</div></div>
    </div>
    <div class="rp-kpi-row">
      <div class="rp-kpi-icon" style="background:rgba(59,130,246,.1);color:#3B82F6">${ico('check-square',15)}</div>
      <div class="rp-kpi-body"><div class="rp-kpi-val">${abdmY}</div><div class="rp-kpi-lbl">ABDM Compliant</div></div>
    </div>

    <div style="height:1px;background:var(--border-lt);margin:16px 0"></div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px">By Region</div>
    ${regBars || '<div style="font-size:12px;color:var(--muted)">No region data</div>'}

    <div style="height:1px;background:var(--border-lt);margin:16px 0"></div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px">⚠️ Threat Watchlist</div>
    ${watchlist.length === 0
      ? `<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px 0">${ico('check-circle',18)}<br><span style="margin-top:6px;display:block">No high/medium threats</span></div>`
      : watchlist.map(c => {
          const lvl = tLevel(c.threatLevel);
          const col = tColor(lvl);
          return `<div class="watch-item" onclick="openDrawer('${c.id}')">
            <div class="watch-dot" style="background:${col};box-shadow:0 0 0 3px ${col}22;margin-top:5px"></div>
            <div style="flex:1;min-width:0">
              <div class="watch-name">${c.name}</div>
              <div class="watch-co">${c.company||'—'}</div>
            </div>
            <span class="badge" style="background:${tBg(lvl)};color:${col};border:none;font-size:10px;flex-shrink:0">${tLabel(lvl)}</span>
          </div>`;
        }).join('')}`;

  /* Animate bars */
  setTimeout(() => {
    document.querySelectorAll('.pulse-fill[data-pct]').forEach(b => { b.style.width = b.dataset.pct + '%'; });
  }, 120);
}

/* ── Search ── */
document.getElementById('cmpSearch').addEventListener('input', function() {
  _searchQ = this.value.trim();
  renderCards();
});

/* ── Init ── */
async function init() {
  try {
    _all = await api('/competitors');
    buildChips();
    buildRightPanel();
    renderCards();
  } catch(e) {
    document.getElementById('cmpCards').innerHTML =
      `<div class="cmp-empty"><div class="cmp-empty-icon">${ico('alert-triangle',24)}</div><div style="font-size:14px;font-weight:700;color:var(--danger)">Failed to load</div><div style="font-size:12px;color:var(--muted)">Check server connection</div></div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
